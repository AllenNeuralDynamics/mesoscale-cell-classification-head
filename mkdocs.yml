site_name: Mesoscale Cell Classification Head
site_description: GPU-accelerated cell clustering for mesoscale SmartSPIM microscopy data.
repo_url: https://github.com/AllenNeuralDynamics/mesoscale-cell-classification-head
docs_dir: docs

theme:
  name: material
  palette:
    primary: indigo

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: true

nav:
  - Home: index.md
  - API Reference:
      - clustering: api/clustering.md
      - feature_extraction: api/feature_extraction.md
      - spatial: api/spatial.md
      - pipeline: api/pipeline.md
